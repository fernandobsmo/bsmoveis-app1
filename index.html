/* ── localStorage adapter para window.storage ── */
window.storage = {
  get: function(key, shared) {
    return new Promise(function(resolve, reject) {
      try {
        var val = localStorage.getItem(key);
        if (val === null) reject(new Error('Key not found: ' + key));
        else resolve({ key: key, value: val, shared: !!shared });
      } catch(e) { reject(e); }
    });
  },
  set: function(key, value, shared) {
    return new Promise(function(resolve) {
      try {
        localStorage.setItem(key, typeof value === 'string' ? value : JSON.stringify(value));
        resolve({ key: key, value: value, shared: !!shared });
      } catch(e) { resolve(null); }
    });
  },
  delete: function(key, shared) {
    return new Promise(function(resolve) {
      try { localStorage.removeItem(key); } catch(e) {}
      resolve({ key: key, deleted: true, shared: !!shared });
    });
  },
  list: function(prefix, shared) {
    return new Promise(function(resolve) {
      var keys = [];
      try {
        for (var i = 0; i < localStorage.length; i++) {
          var k = localStorage.key(i);
          if (!prefix || k.startsWith(prefix)) keys.push(k);
        }
      } catch(e) {}
      resolve({ keys: keys, prefix: prefix, shared: !!shared });
    });
  }
};
</script>

function ItemCard({item,idx,total,precos,onUpdate,onRemove}) {
  const p=precos[item.tipo]&&precos[item.tipo][item.variante];
  const [catSel,setCatSel]=useState(()=>catDeTipo(item.tipo).id);
  const cat=CATEGORIAS.find(c=>c.id===catSel)||CATEGORIAS[0];
  const tiposDaCat=cat.tipos.filter(t=>!!precos[t]);
  const vars=Object.keys(precos[item.tipo]||{});
  function handleCat(cid){setCatSel(cid);const nc=CATEGORIAS.find(c=>c.id===cid);if(nc&&nc.tipos.length>0&&precos[nc.tipos[0]])onUpdate(item.id,"tipo",nc.tipos[0]);}
  const PLANOS=[
    {label:"🔵 Essencial",field:"overEss",def:p?p.ess:"",cor:"#37474F",bg:"#ECEFF1",borda:"#90A4AE"},
    {label:"⭐ Executivo", field:"overExe",def:p?p.exe:"",cor:"#1565C0",bg:"#E3F2FD",borda:"#90CAF9"},
    {label:"💎 Premium",   field:"overPre",def:p?p.pre:"",cor:"#6A1B9A",bg:"#F3E5F5",borda:"#CE93D8"},
  ];
  return (
    <div style={{background:idx%2===0?"#F7F9FF":"#FAFBFF",borderRadius:"14px",padding:"14px",marginBottom:"12px",border:"1.5px solid rgba(26,58,92,0.10)"}}>

        <span style={{background:"#1A3A5C",color:"#FFF",borderRadius:"20px",padding:"3px 14px",fontSize:"11px",fontWeight:"bold"}}>Item {idx+1}</span>
        {total>1&&<button onClick={()=>onRemove(item.id)} style={{background:"#FFEBEE",border:"none",color:"#C62828",borderRadius:"8px",padding:"4px 10px",cursor:"pointer",fontSize:"12px",fontWeight:"bold"}}>✕ Remover</button>}
      </div>
      <div style={{marginBottom:"10px"}}>
        <div style={{fontSize:"10px",fontWeight:"bold",color:"#6B7A8D",marginBottom:"7px",textTransform:"uppercase"}}>① Categoria</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"6px"}}>
          {CATEGORIAS.map(c=>{const ativa=catSel===c.id;return(
            <button key={c.id} onClick={()=>handleCat(c.id)} style={{padding:"8px 6px",borderRadius:"10px",border:"2px solid "+(ativa?c.cor:"transparent"),background:ativa?c.bg:"#F0F4FA",color:ativa?c.cor:"#6B7A8D",fontWeight:ativa?"bold":"600",fontSize:"11px",cursor:"pointer",textAlign:"left",lineHeight:"1.3"}}>{c.label}</button>
          );})}
        </div>
      </div>
      <div style={{marginBottom:"10px"}}>
        <div style={{fontSize:"10px",fontWeight:"bold",color:"#6B7A8D",marginBottom:"5px",textTransform:"uppercase"}}>② Serviço</div>
        <select value={item.tipo} onChange={e=>onUpdate(item.id,"tipo",e.target.value)} style={{width:"100%",padding:"10px 12px",borderRadius:"9px",border:"2px solid "+cat.cor,fontSize:"13px",outline:"none",background:cat.bg,boxSizing:"border-box",fontWeight:"bold",color:cat.cor}}>
          {tiposDaCat.map(t=><option key={t} value={t}>{t}</option>)}
        </select>
      </div>
      {vars.length>1&&<div style={{marginBottom:"12px"}}>
        <div style={{fontSize:"10px",fontWeight:"bold",color:"#6B7A8D",marginBottom:"5px",textTransform:"uppercase"}}>③ Tamanho / Variante</div>
        <select value={item.variante} onChange={e=>onUpdate(item.id,"variante",e.target.value)} style={{width:"100%",padding:"10px 12px",borderRadius:"9px",border:"1.5px solid rgba(26,58,92,0.12)",fontSize:"13px",outline:"none",background:"#F7F9FC",boxSizing:"border-box"}}>
          {vars.map(v=><option key={v} value={v}>{v}</option>)}
        </select>
      </div>}
      {vars.length===1&&<div style={{marginBottom:"12px",fontSize:"12px",color:"#6B7A8D",background:"#F7F9FC",borderRadius:"8px",padding:"8px 12px"}}>📐 Variante: <strong>{vars[0]}</strong></div>}
      <div style={{background:"#FAFBFF",borderRadius:"10px",padding:"10px",border:"1.5px solid rgba(26,58,92,0.08)"}}>
        <div style={{fontSize:"10px",fontWeight:"bold",color:"#6B7A8D",marginBottom:"8px",textTransform:"uppercase"}}>④ Preços</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"8px"}}>
          {PLANOS.map(pl=>{const cur=item[pl.field]!==""&&item[pl.field]!==undefined?item[pl.field]:pl.def;const editado=item[pl.field]!==""&&item[pl.field]!==undefined&&item[pl.field]!==pl.def;return(
            <div key={pl.field}>
              <div style={{fontSize:"10px",fontWeight:"bold",color:pl.cor,marginBottom:"4px",textAlign:"center"}}>{pl.label}</div>
              <input value={cur} placeholder={pl.def} onChange={e=>onUpdate(item.id,pl.field,e.target.value.replace(/[^0-9.,]/g,""))} style={{width:"100%",padding:"9px 4px",borderRadius:"8px",border:"1.5px solid "+(editado?pl.borda:"rgba(26,58,92,0.12)"),fontSize:"14px",fontWeight:"bold",color:pl.cor,outline:"none",background:editado?pl.bg:"#FFF",boxSizing:"border-box",textAlign:"center"}}/>
              {editado&&<div style={{fontSize:"9px",color:pl.cor,textAlign:"center",marginTop:"2px"}}>Padrão: {pl.def}</div>}
            </div>
          );})}
        </div>
        <button onClick={()=>{onUpdate(item.id,"overEss","");onUpdate(item.id,"overExe","");onUpdate(item.id,"overPre","");}} style={{width:"100%",marginTop:"8px",padding:"6px",borderRadius:"7px",border:"1.5px dashed #DDD",background:"transparent",color:"#AAA",fontSize:"10px",fontWeight:"bold",cursor:"pointer"}}>↩️ Restaurar preços padrão</button>
      </div>
      {p&&p.novo&&<div style={{marginTop:"8px",fontSize:"11px",color:"#6A1B9A",textAlign:"center",background:"#F3E5F5",borderRadius:"8px",padding:"5px 10px",fontWeight:"600"}}>🆚 Sofá novo equivalente: <strong>R$ {p.novo}</strong></div>}
    </div>
  );
}

/* ════════════════════════════════════════════════
   CLIENTE DETALHE

function ClienteDetalhe({cliente,user,precos,empresa,onUpdate,onBack,onDelete}) {
  const [subAba,setSubAba]=useState("itens");
  const [pendingEtapa,setPendingEtapa]=useState(null);
  const [novaObs,setNovaObs]=useState("");
  const [copiado,setCopiado]=useState(false);
  const [orcSalvo,setOrcSalvo]=useState(false);
  const [draftItens,setDraftItens]=useState(cliente.itens||[]);
  const [temAlter,setTemAlter]=useState(false);
  const [urlFotoInput,setUrlFotoInput]=useState({antes:"",depois:""});
  const txtRef=useRef(null);

  useEffect(()=>{setDraftItens(cliente.itens||[]);setTemAlter(false);},[cliente.id]);

  const itens=draftItens;
  const totalEss=itens.reduce((s,it)=>{const p=precos[it.tipo]&&precos[it.tipo][it.variante];return s+(p?toN(p.ess):0);},0);
  const totalExe=itens.reduce((s,it)=>{const p=precos[it.tipo]&&precos[it.tipo][it.variante];return s+(p?toN(p.exe):0);},0);
  const totalPre=itens.reduce((s,it)=>{const p=precos[it.tipo]&&precos[it.tipo][it.variante];return s+(p?toN(p.pre):0);},0);
  const planoValBruto=cliente.planoEscolhido==="ess"?totalEss:cliente.planoEscolhido==="pre"?totalPre:totalExe;
  const desconto=toN(cliente.desconto),planoVal=Math.max(0,planoValBruto-desconto);
  const recebido=toN(cliente.entradaPaga)+toN(cliente.saldoPago),saldoDev=Math.max(0,planoVal-recebido);
  const custTotal=toN(cliente.custoTecido)+toN(cliente.custoEspuma)+toN(cliente.custoMaoObra);
  const margem=planoVal>0?((planoVal-custTotal)/planoVal*100):0;
  const ei=etapaInfo(cliente.etapa),sp=sprodInfo(cliente.statusProducao||"aguardando");
  const tel=(cliente.telefone||"").replace(/\D/g,"");
  const msg=gerarMensagem(itens,precos,prNome(cliente),empresa);
  const waUrl=tel?("https://api.whatsapp.com/send?phone=55"+tel+"&text="+encodeURIComponent(msg)):("https://api.whatsapp.com/send?text="+encodeURIComponent(msg));

  function upd(patch){onUpdate({...cliente,...patch,atualizadoEm:new Date().toISOString(),dataUltimoContato:new Date().toISOString()});}
  function updItens(novos){setDraftItens(novos);setTemAlter(true);}
  function addItemC(){updItens([...itens,novoItem()]);}
  function rmItemC(id){updItens(itens.filter(it=>it.id!==id));}
  function updItemC(id,campo,valor){updItens(itens.map(it=>{if(it.id!==id)return it;if(campo==="tipo")return{id:it.id,tipo:valor,variante:Object.keys(precos[valor]||{})[0]||""};return{...it,[campo]:valor};}));}
  function salvarCad(){onUpdate({...cliente,itens:draftItens,atualizadoEm:new Date().toISOString()});setTemAlter(false);}
  function addObs(){if(!novaObs.trim())return;upd({obs:[...(cliente.obs||[]),{texto:novaObs.trim(),usuario:user,hora:agora(),data:hoje()}]});setNovaObs("");}
  function salvarHistorico(){const entrada={id:Math.random(),data:hoje(),hora:agora(),usuario:user,itens:itens.map(it=>({tipo:it.tipo,variante:it.variante})),totalEss:fBR(totalEss),totalExe:fBR(totalExe),totalPre:fBR(totalPre)};upd({historicOrcamentos:[...(cliente.historicOrcamentos||[]),entrada].slice(-15)});setOrcSalvo(true);setTimeout(()=>setOrcSalvo(false),2500);}
  function copiar(){if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(msg).then(()=>{setCopiado(true);setTimeout(()=>setCopiado(false),3000);}).catch(fb);}else fb();}
  function fb(){if(txtRef.current){txtRef.current.value=msg;txtRef.current.select();try{document.execCommand("copy");}catch(e){}}setCopiado(true);setTimeout(()=>setCopiado(false),3000);}
  function baixarMsg(){const nome="orcamento-"+nomeExib(cliente).replace(/\s/g,"-")+"-"+new Date().toISOString().slice(0,10)+".txt";try{const blob=new Blob([msg],{type:"text/plain;charset=utf-8"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=nome;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);}catch(e){copiar();}}
  function addFotoUrl(tipo,url){if(!url||!url.trim())return;const campo=tipo==="antes"?"fotosAntes":"fotosDepois";upd({[campo]:[...(cliente[campo]||[]),url.trim()].slice(-10)});setUrlFotoInput(p=>({...p,[tipo]:"")));}

  const sInp={width:"100%",padding:"10px 12px",borderRadius:"8px",border:"1.5px solid rgba(26,58,92,0.10)",fontSize:"13px",outline:"none",background:"#F7F9FC",boxSizing:"border-box"};
  const sCard={background:"#FFF",borderRadius:"14px",padding:"16px",boxShadow:"0 2px 12px rgba(26,58,92,0.08)",marginBottom:"12px"};
  const SUBTABS=[["itens","📋 Itens"],["msg","💬 Msg"],["financeiro","💰 Fin."],["fotos","📸 Fotos"],["obs","📝 Notas"]];

  return (
    <div style={{fontFamily:"Arial,sans-serif",minHeight:"100vh",background:"#F0F4FA"}}>

      <div style={{background:"linear-gradient(90deg,#1A3A5C,#2A5280)",padding:"12px 16px"}}>
        <button onClick={onBack} style={{background:"transparent",border:"none",color:"rgba(255,255,255,0.65)",fontSize:"13px",cursor:"pointer",marginBottom:"8px",padding:"0"}}>← Voltar ao CRM</button>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:"8px"}}>
          <div>
            <div style={{color:"#FFF",fontWeight:"bold",fontSize:"18px"}}>{nomeExib(cliente)}</div>
            <div style={{color:"rgba(255,255,255,0.6)",fontSize:"11px",marginTop:"2px"}}>🔑 Código: <strong style={{color:"#C8A84B"}}>{gerarCodigoCliente(cliente)}</strong></div>
            {cliente.telefone&&<div style={{color:"#C8A84B",fontSize:"12px"}}>📱 {cliente.telefone}</div>}
          </div>
          <div style={{display:"flex",gap:"6px",flexWrap:"wrap"}}>
            <span style={{padding:"4px 10px",borderRadius:"20px",fontSize:"11px",fontWeight:"bold",background:ei.bg,color:ei.cor}}>{ei.label}</span>
            <span style={{padding:"4px 10px",borderRadius:"20px",fontSize:"11px",fontWeight:"bold",background:sp.bg,color:sp.cor}}>{sp.label}</span>
          </div>
        </div>
      </div>
      <div style={{background:"#FFF",padding:"12px 16px",borderBottom:"1px solid #EEE",overflowX:"auto"}}>

        <div style={{display:"inline-flex",gap:"5px",marginBottom:"10px"}}>

            <a href={"https://wa.me/55"+tel2+"?text="+encodeURIComponent(info.msg(nomeP))} target="_blank" rel="noopener noreferrer" style={{display:"flex",alignItems:"center",justifyContent:"center",gap:"8px",padding:"11px",borderRadius:"10px",background:"#25D366",color:"#FFF",fontWeight:"bold",fontSize:"13px",textDecoration:"none"}}>💬 Enviar — {info.proximo}</a>

function App() {
  const [user,setUser]=useState("");
  const [senhaOk,setSenhaOk]=useState(false);
  const [precos,setPrecos]=useState(PRECOS_ORIG);
  const [clientes,setClientes]=useState([]);

  const [copiadoOrc,setCopiadoOrc]=useState(false);
  const [salvando,setSalvando]=useState(false);
  const [sync,setSync]=useState("ok");
  const [ultimaSync,setUltimaSync]=useState("");
  const [clienteSel,setClienteSel]=useState(null);
  const [empresa,setEmpresa]=useState({nome:"BS Móveis Estofados",whatsapp:"5571985039240",cidade:"Salvador e Lauro de Freitas",saudacao:"Aqui é da *BS Móveis Estofados* e preparei"});
  const [filtroEtapa,setFiltroEtapa]=useState("todos");
  const [filtroVendedor,setFiltroVendedor]=useState("todos");
  const [busca,setBusca]=useState("");
  const [modoKanban,setModoKanban]=useState(false);
  const [modalNovo,setModalNovo]=useState(false);
  const [novoC,setNovoC]=useState({nome:"",telefone:"",indicadoPor:""});
  const [log,setLog]=useState([]);
  const [editandoPreco,setEditandoPreco]=useState(null);
  const [editVals,setEditVals]=useState({});
  const [objecaoCop,setObjecaoCop]=useState(null);
  const [iaMsgs,setIaMsgs]=useState([]);
  const [iaInput,setIaInput]=useState("");
  const [iaLoading,setIaLoading]=useState(false);
  const [novoTecido,setNovoTecido]=useState({nome:"",cor:"",metros:"0",minimo:"2",plano:"exe"});
  const [novaMeta,setNovaMeta]=useState({vendedor:"",meta:"0",comissaoPct:"5",mes:mesAtual()});
  const [secaoConfig,setSecaoConfig]=useState("backup");
  const [exportCopiado,setExportCopiado]=useState(false);
  const [draftEmp,setDraftEmp]=useState(empresa);
  const [empSalvo,setEmpSalvo]=useState(false);
  const [showJsonArea,setShowJsonArea]=useState(false);
  const [jsonText,setJsonText]=useState("");
  const [pendingImport,setPendingImport]=useState(null);
  const [importStatus,setImportStatus]=useState(null);

  const txtRefOrc=useRef(null);
  const iaBottomRef=useRef(null);
  const ultimoJson=useRef(null);
  const precosRef=useRef(precos);
  const clientesRef=useRef(clientes);
  const tecidosRef=useRef(tecidos);
  const metasRef=useRef(metas);
  const logRef=useRef(log);
  const userRef=useRef(user);
  const empresaRef=useRef(empresa);

  useEffect(()=>{window.storage.get("bsmoveis-user",false).then(r=>{if(r&&r.value)setUser(r.value);}).catch(()=>{});},[]);
  useEffect(()=>{empresaRef.current=empresa;},[empresa]);
  useEffect(()=>{clientesRef.current=clientes;},[clientes]);
  useEffect(()=>{tecidosRef.current=tecidos;},[tecidos]);
  useEffect(()=>{metasRef.current=metas;},[metas]);
  useEffect(()=>{logRef.current=log;},[log]);
  useEffect(()=>{userRef.current=user;},[user]);

  useEffect(()=>{
    if(!user)return;
    carregar(false);
    const id=setInterval(()=>carregar(true),20000);
    return()=>clearInterval(id);
  },[user]);

  function carregar(silencioso){
    if(!silencioso)setSync("loading");
    window.storage.get(SK,true).then(r=>{
      if(r&&r.value){
        if(r.value===ultimoJson.current){if(!silencioso)setSync("ok");return;}
        ultimoJson.current=r.value;
        const d=JSON.parse(r.value);
        if(d.precos)setPrecos(d.precos);
        if(d.clientes)setClientes(d.clientes);
        if(d.tecidos)setTecidos(d.tecidos);
        if(d.metas)setMetas(d.metas);
        if(d.log)setLog(d.log.slice(-40));
        if(d.empresa)setEmpresa(d.empresa);
      }
      if(!silencioso){setSync("ok");setUltimaSync(agora());}
    }).catch(()=>{if(!silencioso)setSync("erro");});
  }

  function salvarTudo(np,nc,nt,nm,acao,ne){
    const novoPrecos=np||precosRef.current;
    const novoClientes=nc||clientesRef.current;
    const novoTecidos=nt||tecidosRef.current;
    const novoMetas=nm||metasRef.current;
    const novoEmpresa=ne||empresaRef.current;
    const nl=[...logRef.current,{user:userRef.current,acao,hora:agora()}].slice(-40);
    precosRef.current=novoPrecos;clientesRef.current=novoClientes;tecidosRef.current=novoTecidos;metasRef.current=novoMetas;logRef.current=nl;empresaRef.current=novoEmpresa;
    if(np)setPrecos(np);if(nc)setClientes(nc);if(nt)setTecidos(nt);if(nm)setMetas(nm);if(ne){setEmpresa(ne);setDraftEmp(ne);}setLog(nl);
    setSalvando(true);setSync("loading");
    const payload={precos:novoPrecos,clientes:novoClientes,tecidos:novoTecidos,metas:novoMetas,log:nl,empresa:novoEmpresa};
    const json=JSON.stringify(payload);ultimoJson.current=json;
    window.storage.set(SK,json,true).then(()=>{setSync("ok");setUltimaSync(agora());setSalvando(false);}).catch(()=>{setSync("erro");setSalvando(false);});
  }

  function login(nome){window.storage.set("bsmoveis-user",nome,false).catch(()=>{});setUser(nome);}
  function logout(){window.storage.delete("bsmoveis-user",false).catch(()=>{});setUser("");setClienteSel(null);}
  function criarCliente(){if(!novoC.nome.trim()&&!novoC.telefone.trim())return;const novo={...novoCliente(novoC.nome,novoC.telefone,user),indicadoPor:(novoC.indicadoPor||"").trim()};salvarTudo(null,[...clientesRef.current,novo],null,null,"Novo cliente: "+nomeExib(novo));setModalNovo(false);setNovoC({nome:"",telefone:"",indicadoPor:""});setClienteSel(novo);}
  function atualizarCliente(cli){salvarTudo(null,clientesRef.current.map(c=>c.id===cli.id?cli:c),null,null,"Atualizou: "+nomeExib(cli));setClienteSel(cli);}
  function deletarCliente(id){salvarTudo(null,clientesRef.current.filter(c=>c.id!==id),null,null,"Removeu cliente");setClienteSel(null);}

  function addItemOrc(){setItensOrc(p=>[...p,novoItem()]);}
  function rmItemOrc(id){setItensOrc(p=>p.filter(x=>x.id!==id));}
  function updItemOrc(id,campo,valor){setItensOrc(prev=>prev.map(it=>{if(it.id!==id)return it;if(campo==="tipo")return{id:it.id,tipo:valor,variante:Object.keys(precos[valor]||{})[0]||""};return{...it,[campo]:valor};}));}

  const msgOrc=gerarMensagem(itensOrc,precos,null,empresa);
  const waUrlOrc="https://api.whatsapp.com/send?text="+encodeURIComponent(msgOrc);

  function copiarOrc(){if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(msgOrc).then(()=>{setCopiadoOrc(true);setTimeout(()=>setCopiadoOrc(false),3000);}).catch(fbOrc);}else fbOrc();}
  function fbOrc(){if(txtRefOrc.current){txtRefOrc.current.value=msgOrc;txtRefOrc.current.select();try{document.execCommand("copy");}catch(e){}}setCopiadoOrc(true);setTimeout(()=>setCopiadoOrc(false),3000);}
  function baixarOrc(){const nome="orcamento-bsmoveis-"+new Date().toISOString().slice(0,10)+".txt";try{const blob=new Blob([msgOrc],{type:"text/plain;charset=utf-8"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=nome;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);}catch(e){fbOrc();}}

  function exportarJSON(){const dados={precos,clientes,tecidos,metas,log,empresa,exportadoEm:new Date().toISOString(),versao:"v3"};const json=JSON.stringify(dados,null,2);try{const blob=new Blob([json],{type:"application/json"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download="bsmoveis-backup-"+new Date().toISOString().slice(0,10)+".json";document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);}catch(e){setJsonText(json);setShowJsonArea(true);}}
  function copiarJSON(){const dados={precos,clientes,tecidos,metas,log,empresa,exportadoEm:new Date().toISOString(),versao:"v3"};const json=JSON.stringify(dados,null,2);setJsonText(json);setShowJsonArea(true);if(navigator.clipboard&&navigator.clipboard.writeText)navigator.clipboard.writeText(json).then(()=>{setExportCopiado(true);setTimeout(()=>setExportCopiado(false),3000);}).catch(()=>{});}
  function importarJSON(e){const file=e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(!d.clientes&&!d.precos)throw new Error("inválido");setPendingImport(d);}catch(err){setImportStatus("erro");setTimeout(()=>setImportStatus(null),5000);}};reader.readAsText(file);e.target.value="";}
  function confirmarImport(){if(!pendingImport)return;salvarTudo(pendingImport.precos||null,pendingImport.clientes||null,pendingImport.tecidos||null,pendingImport.metas||null,"Restaurou backup JSON",pendingImport.empresa||null);setPendingImport(null);setImportStatus("ok");setTimeout(()=>setImportStatus(null),5000);}
  function salvarPreco(){if(!editandoPreco)return;const np=JSON.parse(JSON.stringify(precos));np[editandoPreco.tipo][editandoPreco.variante]={ess:editVals.ess,exe:editVals.exe,pre:editVals.pre};salvarTudo(np,null,null,null,"Editou preço: "+editandoPreco.tipo+" — "+editandoPreco.variante);setEditandoPreco(null);}
  function salvarEmp(){salvarTudo(null,null,null,null,"Atualizou config empresa",draftEmp);setEmpSalvo(true);setTimeout(()=>setEmpSalvo(false),2500);}

            {[["👥","Total",clientes.length,"#EEF4FB","#1A3A5C"],["📋","Orçamentos",clientes.filter(c=>c.etapa==="orcamento").length,"#FFF3E0","#E65100"],["✅","Fechados",totalFechados,"#E8F5E9","#1B5E20"],["❌","Perdidos",clientes.filter(c=>c.etapa==="perdido").length,"#FFEBEE","#C62828"]].map(m=><div key={m[1]} style={{background:m[3],borderRadius:"12px",padding:"10px 6px",textAlign:"center"}}><div style={{fontSize:"18px"}}>{m[0]}</div><div style={{fontSize:"20px",fontWeight:"bold",color:m[4]}}>{m[2]}</div><div style={{fontSize:"9px",color:m[4],fontWeight:"bold",textTransform:"uppercase"}}>{m[1]}</div></div>)}

          </div>}

          {secaoConfig==="precos"&&<div>
            <div style={{fontSize:"12px",color:"#6B7A8D",marginBottom:"12px"}}>⚠️ Edite os preços para personalizar os orçamentos.</div>
            {TIPOS.map(tipo=><div key={tipo} style={sCard}><div style={{fontWeight:"bold",color:"#1A3A5C",fontSize:"13px",marginBottom:"8px"}}>{tipo}</div>
              {Object.entries(precos[tipo]||{}).map(([variante,vals])=><div key={variante} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderTop:"1px solid rgba(26,58,92,0.10)"}}><div style={{flex:1}}><div style={{fontSize:"12px",fontWeight:"bold",color:"#1C2B3A"}}>{variante}</div><div style={{fontSize:"11px",color:"#6B7A8D"}}>Ess R${vals.ess} · Exe R${vals.exe} · Pre R${vals.pre}</div></div><button onClick={()=>{setEditandoPreco({tipo,variante});setEditVals({ess:vals.ess,exe:vals.exe,pre:vals.pre});}} style={{padding:"5px 12px",borderRadius:"8px",border:"1.5px solid #1A3A5C",background:"#FFF",color:"#1A3A5C",fontSize:"12px",fontWeight:"bold",cursor:"pointer"}}>✏️</button></div>)}
            </div>)}
            <button onClick={()=>{if(window.confirm("Resetar todos os preços para o padrão?"))salvarTudo(PRECOS_ORIG,null,null,null,"Resetou preços");}} style={{width:"100%",padding:"11px",borderRadius:"10px",border:"1.5px solid #C62828",background:"#FFEBEE",color:"#C62828",fontWeight:"bold",fontSize:"13px",cursor:"pointer"}}>↩️ Resetar todos os preços</button>
          </div>}

          {secaoConfig==="tecidos"&&<div>
            <div style={sCard}>
              <div style={{fontWeight:"bold",color:"#1A3A5C",fontSize:"13px",marginBottom:"12px"}}>➕ Adicionar tecido</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px",marginBottom:"10px"}}>
                {[["Nome","nome","Veludo Inca"],["Cor","cor","Cinza"],["Metros","metros","0"],["Mín.","minimo","2"]].map(f=><div key={f[1]}><div style={{fontSize:"11px",fontWeight:"bold",color:"#1A3A5C",marginBottom:"3px"}}>{f[0]}</div><input value={novoTecido[f[1]]} onChange={e=>{const v=e.target.value;setNovoTecido(p=>({...p,[f[1]]:v}));}} placeholder={f[2]} style={sInp}/></div>)}
              </div>
              <div style={{marginBottom:"12px"}}><select value={novoTecido.plano} onChange={e=>{const v=e.target.value;setNovoTecido(p=>({...p,plano:v}));}} style={sInp}><option value="ess">🔵 Essencial</option><option value="exe">⭐ Executivo</option><option value="pre">💎 Premium</option></select></div>
              <button onClick={()=>{if(!novoTecido.nome.trim())return;salvarTudo(null,null,[...tecidos,{id:Math.random(),...novoTecido}],null,"Adicionou tecido: "+novoTecido.nome);setNovoTecido({nome:"",cor:"",metros:"0",minimo:"2",plano:"exe"});}} style={{width:"100%",padding:"11px",borderRadius:"10px",border:"none",background:"#1A3A5C",color:"#FFF",fontWeight:"bold",fontSize:"13px",cursor:"pointer"}}>+ Adicionar</button>
            </div>
            {tecidos.map(t=>{const baixo=toN(t.metros)<=toN(t.minimo);return(<div key={t.id} style={{...sCard,borderLeft:"4px solid "+(baixo?"#C62828":"#1B5E20")}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:"8px"}}><div><div style={{fontWeight:"bold",color:"#1C2B3A"}}>{t.nome}{t.cor?" — "+t.cor:""}</div><div style={{fontSize:"11px",color:"#6B7A8D"}}>{{ess:"🔵 Essencial",exe:"⭐ Executivo",pre:"💎 Premium"}[t.plano]}</div></div><button onClick={()=>salvarTudo(null,null,tecidos.filter(x=>x.id!==t.id),null,"Removeu tecido")} style={{background:"#FFEBEE",border:"none",color:"#C62828",borderRadius:"8px",padding:"4px 10px",cursor:"pointer",fontSize:"12px",fontWeight:"bold"}}>✕</button></div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px"}}>
                <div><div style={{fontSize:"11px",fontWeight:"bold",color:"#1A3A5C",marginBottom:"3px"}}>Metros</div><input value={t.metros} onChange={e=>{const v=e.target.value.replace(/[^0-9.,]/g,"");salvarTudo(null,null,tecidos.map(x=>x.id===t.id?{...x,metros:v}:x),null,"Estoque");}} style={{...sInp,textAlign:"center",fontWeight:"bold",background:baixo?"#FFEBEE":"#F7F9FC",color:baixo?"#C62828":"#1C2B3A"}}/></div>
                <div><div style={{fontSize:"11px",fontWeight:"bold",color:"#1A3A5C",marginBottom:"3px"}}>Mín.</div><input value={t.minimo} onChange={e=>{const v=e.target.value.replace(/[^0-9.,]/g,"");salvarTudo(null,null,tecidos.map(x=>x.id===t.id?{...x,minimo:v}:x),null,"Mínimo");}} style={{...sInp,textAlign:"center"}}/></div>
              </div>
              {baixo&&<div style={{marginTop:"8px",fontSize:"11px",color:"#C62828",fontWeight:"bold",background:"#FFEBEE",borderRadius:"8px",padding:"5px 10px"}}>⚠️ Estoque abaixo do mínimo!</div>}
            </div>);})}
          </div>}

          {secaoConfig==="metas"&&<div>
            <div style={sCard}>
              <div style={{fontWeight:"bold",color:"#1A3A5C",fontSize:"13px",marginBottom:"12px"}}>➕ Definir meta</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px",marginBottom:"10px"}}>
                <div><div style={{fontSize:"11px",fontWeight:"bold",color:"#1A3A5C",marginBottom:"3px"}}>Vendedor</div><input value={novaMeta.vendedor} onChange={e=>{const v=e.target.value;setNovaMeta(p=>({...p,vendedor:v}));}} placeholder="Nome" style={sInp}/></div>
                <div><div style={{fontSize:"11px",fontWeight:"bold",color:"#1A3A5C",marginBottom:"3px"}}>Mês</div><input type="month" value={novaMeta.mes} onChange={e=>{const v=e.target.value;setNovaMeta(p=>({...p,mes:v}));}} style={sInp}/></div>
                <div><div style={{fontSize:"11px",fontWeight:"bold",color:"#1A3A5C",marginBottom:"3px"}}>Meta (R$)</div><input value={novaMeta.meta} onChange={e=>{const v=e.target.value.replace(/[^0-9.,]/g,"");setNovaMeta(p=>({...p,meta:v}));}} placeholder="15000" style={sInp}/></div>
                <div><div style={{fontSize:"11px",fontWeight:"bold",color:"#1A3A5C",marginBottom:"3px"}}>Comissão (%)</div><input value={novaMeta.comissaoPct} onChange={e=>{const v=e.target.value.replace(/[^0-9.,]/g,"");setNovaMeta(p=>({...p,comissaoPct:v}));}} placeholder="5" style={sInp}/></div>
              </div>
              <button onClick={()=>{if(!novaMeta.vendedor.trim())return;const nm=metas.filter(m=>!(m.vendedor===novaMeta.vendedor&&m.mes===novaMeta.mes)).concat([{id:Math.random(),...novaMeta}]);salvarTudo(null,null,null,nm,"Atualizou metas");setNovaMeta({vendedor:"",meta:"0",comissaoPct:"5",mes:mesAtual()});}} style={{width:"100%",padding:"11px",borderRadius:"10px",border:"none",background:"#1A3A5C",color:"#FFF",fontWeight:"bold",fontSize:"13px",cursor:"pointer"}}>+ Salvar meta</button>
            </div>
            {metas.sort((a,b)=>b.mes.localeCompare(a.mes)).map(m=><div key={m.id} style={{...sCard,borderLeft:"4px solid #C8A84B"}}><div style={{display:"flex",justifyContent:"space-between"}}><div><div style={{fontWeight:"bold",color:"#1C2B3A"}}>{m.vendedor}</div><div style={{fontSize:"12px",color:"#6B7A8D"}}>{m.mes} · Meta: R$ {fBR(toN(m.meta))} · {m.comissaoPct}%</div></div><button onClick={()=>salvarTudo(null,null,null,metas.filter(x=>x.id!==m.id),null,"Removeu meta")} style={{background:"#FFEBEE",border:"none",color:"#C62828",borderRadius:"8px",padding:"4px 10px",cursor:"pointer",fontSize:"12px",fontWeight:"bold"}}>✕</button></div></div>)}
          </div>}

          {secaoConfig==="objecoes"&&<div>
            <div style={{fontSize:"12px",color:"#6B7A8D",marginBottom:"12px",textAlign:"center"}}>Toque para copiar 📋</div>
            {OBJECOES.map((o,i)=><div key={i} onClick={()=>{setObjecaoCop(i);if(navigator.clipboard&&navigator.clipboard.writeText)navigator.clipboard.writeText(o.resp).catch(()=>{});setTimeout(()=>setObjecaoCop(null),2000);}} style={{background:"#FFF",borderRadius:"14px",padding:"16px",marginBottom:"10px",boxShadow:"0 2px 10px rgba(26,58,92,0.07)",cursor:"pointer",borderLeft:"4px solid "+(objecaoCop===i?"#1B5E20":"#1A3A5C")}}><div style={{fontWeight:"bold",color:"#1A3A5C",fontSize:"13px",marginBottom:"8px"}}>❓ {o.obj}</div><div style={{fontSize:"12px",color:"#6B7A8D",whiteSpace:"pre-wrap",lineHeight:"1.65"}}>{o.resp}</div><div style={{marginTop:"8px",fontSize:"11px",color:objecaoCop===i?"#1B5E20":"#CCC",fontWeight:"bold"}}>{objecaoCop===i?"✅ Copiado!":"Toque para copiar"}</div></div>)}
          </div>}

          {secaoConfig==="log"&&<div>
            <div style={{fontWeight:"bold",color:"#1A3A5C",fontSize:"13px",marginBottom:"12px"}}>📋 Atividades Recentes ({log.length})</div>
            {log.length===0?<div style={{textAlign:"center",color:"#6B7A8D",padding:"24px 0"}}>Nenhuma atividade.</div>
            :[...log].reverse().map((entry,i)=><div key={i} style={{background:"#FFF",borderRadius:"12px",padding:"10px 14px",marginBottom:"8px",boxShadow:"0 1px 6px rgba(26,58,92,0.07)"}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:"3px"}}><span style={{fontWeight:"bold",color:"#1A3A5C",fontSize:"12px"}}>👤 {entry.user||"Sistema"}</span><span style={{fontSize:"10px",color:"#AAA"}}>{entry.hora||""}</span></div><div style={{fontSize:"12px",color:"#1C2B3A"}}>{entry.acao||"—"}</div></div>)}
          </div>}
        </div>}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
